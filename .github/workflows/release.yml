name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Configure signing
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > ${{ github.workspace }}/release.keystore
            echo "KEYSTORE_FILE=${{ github.workspace }}/release.keystore" >> $GITHUB_ENV
            echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
            echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
            echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV
            echo "Using release keystore from secrets"
          else
            echo "No release keystore configured — using committed debug keystore"
          fi

      - name: Build release APKs with ABI splits
        run: ./gradlew assembleRelease -Pabi.splits.enable=true

      - name: Collect release APKs
        run: |
          mkdir -p release-apks
          for apk in app/build/outputs/apk/release/*.apk; do
            filename=$(basename "$apk")
            case "$filename" in
              *universal*) cp "$apk" release-apks/piper-tts-universal.apk ;;
              *arm64-v8a*) cp "$apk" release-apks/piper-tts-arm64-v8a.apk ;;
              *armeabi-v7a*) cp "$apk" release-apks/piper-tts-armeabi-v7a.apk ;;
              *x86_64*) cp "$apk" release-apks/piper-tts-x86_64.apk ;;
              *)
                if [ ! -f release-apks/piper-tts-universal.apk ]; then
                  cp "$apk" release-apks/piper-tts-universal.apk
                fi
                ;;
            esac
          done

      - name: Verify TTS engine registration in APK
        run: |
          # Use aapt2 to dump the manifest from the universal APK and verify
          # all required TTS components are present
          APK="release-apks/piper-tts-universal.apk"
          AAPT2="${ANDROID_HOME}/build-tools/$(ls ${ANDROID_HOME}/build-tools/ | sort -V | tail -1)/aapt2"
          
          echo "=== Verifying TTS engine manifest ==="
          MANIFEST=$($AAPT2 dump xmltree "$APK" --file AndroidManifest.xml)
          
          # Check TTS_SERVICE intent filter on the service
          echo "$MANIFEST" | grep -q "android.intent.action.TTS_SERVICE" || {
            echo "FAIL: TTS_SERVICE intent filter not found in manifest"
            exit 1
          }
          echo "✓ TTS_SERVICE intent filter present"
          
          # Check BIND_TEXT_TO_SPEECH_SERVICE permission
          echo "$MANIFEST" | grep -q "android.permission.BIND_TEXT_TO_SPEECH_SERVICE" || {
            echo "FAIL: BIND_TEXT_TO_SPEECH_SERVICE permission not found"
            exit 1
          }
          echo "✓ BIND_TEXT_TO_SPEECH_SERVICE permission present"
          
          # Check android.speech.tts meta-data
          echo "$MANIFEST" | grep -q "android.speech.tts" || {
            echo "FAIL: android.speech.tts meta-data not found"
            exit 1
          }
          echo "✓ android.speech.tts meta-data present"
          
          # Check CHECK_TTS_DATA activity
          echo "$MANIFEST" | grep -q "android.speech.tts.engine.CHECK_TTS_DATA" || {
            echo "FAIL: CHECK_TTS_DATA activity not found"
            exit 1
          }
          echo "✓ CHECK_TTS_DATA activity present"
          
          # Check INSTALL_TTS_DATA activity
          echo "$MANIFEST" | grep -q "android.speech.tts.engine.INSTALL_TTS_DATA" || {
            echo "FAIL: INSTALL_TTS_DATA activity not found"
            exit 1
          }
          echo "✓ INSTALL_TTS_DATA activity present"
          
          # Check GET_SAMPLE_TEXT activity
          echo "$MANIFEST" | grep -q "android.speech.tts.engine.GET_SAMPLE_TEXT" || {
            echo "FAIL: GET_SAMPLE_TEXT activity not found"
            exit 1
          }
          echo "✓ GET_SAMPLE_TEXT activity present"
          
          # Check CATEGORY_DEFAULT on all intent filters
          DEFAULT_COUNT=$(echo "$MANIFEST" | grep -c "android.intent.category.DEFAULT" || true)
          if [ "$DEFAULT_COUNT" -lt 4 ]; then
            echo "FAIL: Expected at least 4 CATEGORY_DEFAULT entries (service + 3 activities), found $DEFAULT_COUNT"
            exit 1
          fi
          echo "✓ CATEGORY_DEFAULT present on all intent filters ($DEFAULT_COUNT entries)"
          
          # Check service class name is not obfuscated
          echo "$MANIFEST" | grep -q "com.aitorpazos.pipertts.service.PiperTtsService" || {
            echo "FAIL: PiperTtsService class name appears to be obfuscated or missing"
            exit 1
          }
          echo "✓ PiperTtsService class name preserved"
          
          echo "=== All TTS engine manifest checks passed ==="

      - name: List release artifacts
        run: ls -lh release-apks/

      - name: Build release App Bundle (AAB)
        run: ./gradlew bundleRelease

      - name: Collect AAB
        run: |
          cp app/build/outputs/bundle/release/*.aab release-apks/piper-tts.aab 2>/dev/null || echo "No AAB produced"
          ls -lh release-apks/

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Piper TTS Android v${{ steps.version.outputs.VERSION }}"
          generate_release_notes: true
          files: release-apks/*
          body: |
            ## Piper TTS Android v${{ steps.version.outputs.VERSION }}
            
            Offline text-to-speech for Android powered by [Piper](https://github.com/rhasspy/piper).
            
            ### Downloads
            | File | Architecture | Notes |
            |------|-------------|-------|
            | `piper-tts-arm64-v8a.apk` | 64-bit ARM | Most modern phones — **recommended** |
            | `piper-tts-armeabi-v7a.apk` | 32-bit ARM | Older devices |
            | `piper-tts-x86_64.apk` | x86_64 | Emulators, Chromebooks |
            | `piper-tts-universal.apk` | All | Largest, works everywhere |
            | `piper-tts.aab` | All | Android App Bundle (for Play Store) |
            
            ### Installation
            1. Download the APK for your device architecture (or universal)
            2. Install the APK
            3. Open the app and tap **Manage** to download a voice
            4. Go to **Settings → Text-to-Speech** and select **Piper TTS**
