name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Decode keystore (if available)
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > ${{ github.workspace }}/release.keystore

      - name: Set signing env (if keystore available)
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "KEYSTORE_FILE=${{ github.workspace }}/release.keystore" >> $GITHUB_ENV
          echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
          echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
          echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV

      # Build per-ABI split APKs + universal APK in one pass
      - name: Build release APKs (ABI splits)
        run: ./gradlew assembleRelease -Pabi.splits.enable=true

      - name: Collect APKs
        run: |
          mkdir -p release-artifacts
          APK_DIR=app/build/outputs/apk/release
          # Rename split APKs for clarity
          for apk in "$APK_DIR"/*.apk; do
            name=$(basename "$apk")
            case "$name" in
              *universal*) cp "$apk" release-artifacts/piper-tts-universal.apk ;;
              *arm64*)     cp "$apk" release-artifacts/piper-tts-arm64-v8a.apk ;;
              *armeabi*)   cp "$apk" release-artifacts/piper-tts-armeabi-v7a.apk ;;
              *x86_64*)    cp "$apk" release-artifacts/piper-tts-x86_64.apk ;;
              *)           cp "$apk" "release-artifacts/$name" ;;
            esac
          done
          ls -lh release-artifacts/

      # Build Android App Bundle (AAB) for Play Store
      - name: Build release App Bundle (AAB)
        run: ./gradlew bundleRelease

      - name: Collect AAB
        run: |
          AAB_DIR=app/build/outputs/bundle/release
          cp "$AAB_DIR"/*.aab release-artifacts/piper-tts.aab
          ls -lh release-artifacts/

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Piper TTS Android v${{ steps.version.outputs.VERSION }}"
          generate_release_notes: true
          files: release-artifacts/*
          body: |
            ## Piper TTS Android v${{ steps.version.outputs.VERSION }}
            
            Offline text-to-speech for Android powered by [Piper](https://github.com/rhasspy/piper).
            
            ### APK Downloads
            | File | Architecture | Notes |
            |------|-------------|-------|
            | `piper-tts-arm64-v8a.apk` | 64-bit ARM | Most modern phones — **recommended** |
            | `piper-tts-armeabi-v7a.apk` | 32-bit ARM | Older devices |
            | `piper-tts-x86_64.apk` | x86_64 | Emulators, Chromebooks |
            | `piper-tts-universal.apk` | All | Largest, works everywhere |
            | `piper-tts.aab` | All | Android App Bundle (for Play Store) |
            
            ### Installation
            1. Download the APK for your device architecture (or universal)
            2. Install the APK
            3. Go to **Settings → Text-to-Speech** and select **Piper TTS**
            4. Open the app to browse and download additional voices
            
            ### Bundled Voice
            - en_US-amy-low (English US, ~60MB)
