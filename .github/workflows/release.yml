name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Decode keystore (if available)
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > ${{ github.workspace }}/release.keystore

      - name: Set signing env (if keystore available)
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          echo "KEYSTORE_FILE=${{ github.workspace }}/release.keystore" >> $GITHUB_ENV
          echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
          echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
          echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV

      - name: Build universal APK
        run: ./gradlew assembleRelease

      - name: Rename universal APK
        run: |
          mkdir -p release-apks
          cp app/build/outputs/apk/release/*.apk release-apks/piper-tts-universal.apk

      - name: Build per-ABI APKs
        run: |
          for ABI in arm64-v8a armeabi-v7a x86_64; do
            ./gradlew clean assembleRelease -Pabi.filter="$ABI"
            cp app/build/outputs/apk/release/*.apk "release-apks/piper-tts-${ABI}.apk"
          done

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Piper TTS Android v${{ steps.version.outputs.VERSION }}"
          generate_release_notes: true
          files: release-apks/piper-tts-*.apk
          body: |
            ## Piper TTS Android v${{ steps.version.outputs.VERSION }}
            
            Offline text-to-speech for Android powered by [Piper](https://github.com/rhasspy/piper).
            
            ### APK Downloads
            - **piper-tts-universal.apk** — All architectures (largest, works everywhere)
            - **piper-tts-arm64-v8a.apk** — 64-bit ARM (most modern phones)
            - **piper-tts-armeabi-v7a.apk** — 32-bit ARM (older devices)
            - **piper-tts-x86_64.apk** — x86_64 (emulators, Chromebooks)
            
            ### Installation
            1. Download the APK for your device architecture (or universal)
            2. Install the APK
            3. Go to **Settings → Text-to-Speech** and select **Piper TTS**
            4. Open the app to browse and download additional voices
            
            ### Bundled Voice
            - en_US-amy-low (English US, ~60MB)
