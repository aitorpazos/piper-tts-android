name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Decode keystore
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > app/release.keystore

      - name: Build release APK (signed if keystore available)
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            ./gradlew assembleRelease \
              -Pandroid.injected.signing.store.file=$PWD/app/release.keystore \
              -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
              -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
              -Pandroid.injected.signing.key.password="$KEY_PASSWORD"
          else
            ./gradlew assembleRelease
          fi

      - name: Build per-ABI APKs
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          for ABI in arm64-v8a armeabi-v7a x86_64; do
            if [ -n "$KEYSTORE_BASE64" ]; then
              ./gradlew assembleRelease \
                -Pandroid.injected.signing.store.file=$PWD/app/release.keystore \
                -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
                -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
                -Pandroid.injected.signing.key.password="$KEY_PASSWORD" \
                -Pabi.filter="$ABI"
            else
              ./gradlew assembleRelease -Pabi.filter="$ABI"
            fi
            
            # Rename APK with ABI suffix
            for f in app/build/outputs/apk/release/*.apk; do
              if [ -f "$f" ]; then
                mv "$f" "app/build/outputs/apk/release/piper-tts-${ABI}.apk"
              fi
            done
          done

      - name: Build universal APK
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            ./gradlew assembleRelease \
              -Pandroid.injected.signing.store.file=$PWD/app/release.keystore \
              -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
              -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
              -Pandroid.injected.signing.key.password="$KEY_PASSWORD"
          else
            ./gradlew assembleRelease
          fi
          for f in app/build/outputs/apk/release/app-release*.apk; do
            if [ -f "$f" ]; then
              mv "$f" "app/build/outputs/apk/release/piper-tts-universal.apk"
            fi
          done

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Piper TTS Android v${{ steps.version.outputs.VERSION }}"
          generate_release_notes: true
          files: |
            app/build/outputs/apk/release/piper-tts-*.apk
          body: |
            ## Piper TTS Android v${{ steps.version.outputs.VERSION }}
            
            Offline text-to-speech for Android powered by [Piper](https://github.com/rhasspy/piper).
            
            ### APK Downloads
            - **piper-tts-universal.apk** — All architectures (largest, works everywhere)
            - **piper-tts-arm64-v8a.apk** — 64-bit ARM (most modern phones)
            - **piper-tts-armeabi-v7a.apk** — 32-bit ARM (older devices)
            - **piper-tts-x86_64.apk** — x86_64 (emulators, Chromebooks)
            
            ### Installation
            1. Download the APK for your device architecture (or universal)
            2. Install the APK
            3. Go to **Settings → Text-to-Speech** and select **Piper TTS**
            4. Open the app to browse and download additional voices
            
            ### Bundled Voice
            - en_US-amy-low (English US, ~60MB)
